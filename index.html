<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工具对比 — 作品集首页</title>
    <link rel="stylesheet" href="css/overview.css" />
  </head>
  <body>
    <main class="archive">
      <nav class="version-nav" aria-label="对比版本">
        <div class="version-nav__brand">
          <h1 class="version-nav__title">工具对比</h1>
          <p class="version-nav__desc">作品集首页 · 375×812 · 同参考页对照</p>
          <div class="version-nav__ref-row" id="shared-ref" hidden>
            <span class="version-nav__ref-label">参考页</span>
            <a class="version-nav__ref-link" id="shared-ref-link" href="#" target="_blank" rel="noopener noreferrer"></a>
          </div>
          <p class="version-nav__meta" id="version-count"></p>
        </div>

        <h2 class="version-nav__heading">生成工具</h2>
        <ul class="version-list" id="version-list"></ul>
      </nav>

      <section class="preview-stage" aria-label="网页预览">
        <div class="compare-bar" id="compare-bar">
          <div
            class="preview-mode"
            id="preview-mode"
            role="tablist"
            aria-label="预览模式"
            hidden
          >
            <button
              class="preview-mode__btn"
              type="button"
              role="tab"
              id="preview-mode-compare"
              data-mode="compare"
              aria-selected="true"
            >
              对照
            </button>
            <button
              class="preview-mode__btn"
              type="button"
              role="tab"
              id="preview-mode-solo"
              data-mode="solo"
              aria-selected="false"
            >
              单屏
            </button>
          </div>
          <p class="compare-bar__context" id="compare-context" aria-live="polite"></p>
          <div class="compare-bar__nav">
            <button class="compare-bar__btn" type="button" id="compare-prev" aria-label="上一版">
              ← 上一版
            </button>
            <button class="compare-bar__btn" type="button" id="compare-next" aria-label="下一版">
              下一版 →
            </button>
          </div>
        </div>
        <div class="phone-fit" id="phone-fit">
          <div class="phone-compare-outer" id="phone-compare-outer">
            <div class="phone-compare" id="phone-compare">
              <div class="phone-column" id="reference-column" hidden>
                <div class="phone-scaler">
                  <div class="phone-frame" role="img" aria-label="参考页移动端预览">
                    <span
                      class="phone-snapshot-badge"
                      title="因网站限制无法实时嵌入，此为 375×812 移动端截图"
                    >快照</span>
                    <div class="phone-frame__notch" aria-hidden="true"></div>
                    <iframe
                      class="phone-frame__screen"
                      id="reference-frame"
                      title="参考页移动端预览"
                      sandbox="allow-same-origin allow-scripts"
                    ></iframe>
                  </div>
                  <a
                    class="phone-meta phone-meta--open"
                    id="open-reference"
                    href="https://www.ibm.com/docs/en"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="在新标签打开参考页"
                  >
                    <svg viewBox="0 0 20 20" width="14" height="14" aria-hidden="true">
                      <path
                        fill="currentColor"
                        d="M11 3a1 1 0 1 0 0 2h2.586L8.293 10.293a1 1 0 1 0 1.414 1.414L15 6.414V9a1 1 0 1 0 2 0V4a1 1 0 0 0-1-1h-5z"
                      />
                      <path
                        fill="currentColor"
                        d="M5 5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3a1 1 0 1 0-2 0v3H5V7h3a1 1 0 0 0 0-2H5z"
                      />
                    </svg>
                  </a>
                  <span class="phone-meta phone-meta--size" aria-hidden="true">375 × 812</span>
                </div>
              </div>
              <div class="phone-column" id="preview-column">
                <div class="phone-scaler">
                  <div class="phone-frame" role="img" aria-label="生成结果预览">
                    <div class="phone-frame__notch" aria-hidden="true"></div>
                    <iframe
                      class="phone-frame__screen"
                      id="preview-frame"
                      title="生成网页预览"
                      sandbox="allow-same-origin allow-scripts"
                    ></iframe>
                  </div>
                  <a
                    class="phone-meta phone-meta--open"
                    id="open-preview"
                    href="#"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="单独打开生成页"
                  >
                    <svg viewBox="0 0 20 20" width="14" height="14" aria-hidden="true">
                      <path
                        fill="currentColor"
                        d="M11 3a1 1 0 1 0 0 2h2.586L8.293 10.293a1 1 0 1 0 1.414 1.414L15 6.414V9a1 1 0 1 0 2 0V4a1 1 0 0 0-1-1h-5z"
                      />
                      <path
                        fill="currentColor"
                        d="M5 5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3a1 1 0 1 0-2 0v3H5V7h3a1 1 0 0 0 0-2H5z"
                      />
                    </svg>
                  </a>
                  <span class="phone-meta phone-meta--size" aria-hidden="true">375 × 812</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <aside class="detail-panel" aria-label="对比详情">
        <section class="detail-section detail-section--hero">
          <h3 class="detail-section__heading">对比工具</h3>
          <p class="detail-tool-name" id="detail-tool"></p>
          <p class="detail-section__body" id="detail-tool-detail"></p>
          <p class="detail-section__subheading" id="detail-tools-sub">运行环境</p>
          <ul class="tool-chain" id="detail-tools"></ul>
        </section>

        <section class="detail-section" id="detail-ref-section">
          <h3 class="detail-section__heading">参考网页</h3>
          <a class="ref-page-card" id="detail-ref-page" href="#" target="_blank" rel="noopener noreferrer">
            <span class="ref-page-card__label" id="detail-ref-label"></span>
            <span class="ref-page-card__url" id="detail-ref-url"></span>
          </a>
          <ul class="ref-list ref-list--secondary" id="detail-refs"></ul>
        </section>

        <section class="detail-section">
          <h3 class="detail-section__heading">版本</h3>
          <div class="version-meta">
            <span class="version-meta__id" id="detail-version-id"></span>
            <span class="version-meta__note" id="detail-version-note"></span>
            <span class="status-badge" id="detail-status" data-status="exploration"></span>
          </div>
          <p class="detail-section__body" id="detail-summary"></p>
        </section>

        <section class="detail-section">
          <div class="prompt-header">
            <h3 class="detail-section__heading">Prompt</h3>
            <button class="prompt-copy" type="button" id="copy-prompt">复制</button>
          </div>
          <pre class="prompt-block" id="detail-prompt"></pre>
        </section>
      </aside>
    </main>

    <script src="js/versions.js"></script>
    <script src="js/overview.js"></script>
  </body>
</html>
