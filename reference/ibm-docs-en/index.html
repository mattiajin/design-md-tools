<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=375, initial-scale=1.0" />
    <title>IBM Documentation — Mobile Reference</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        width: 375px;
        height: 812px;
        overflow: hidden;
      }

      body {
        width: 375px;
        height: 812px;
        overflow: hidden;
        background: #000;
      }

      img {
        display: block;
        width: 375px;
        height: 812px;
        object-fit: cover;
        object-position: top center;
      }
    </style>
  </head>
  <body>
    <img
      src="mobile.png"
      alt="IBM Documentation mobile homepage reference (375×812 snapshot)"
      width="375"
      height="812"
    />
  </body>
</html>
